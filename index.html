<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Monitoring</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #005f73; }
        
        /* Lapisan Kunci */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #005f73;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
        }

        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: block;
        }

        button {
            padding: 10px 20px;
            background: #0a9396;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Konten Utama (Disembunyikan) */
        #main-wrapper { display: none; }

        header {
            background: #005f73; color: #fff;
            padding: 0.6rem 1rem; display: flex;
            align-items: center; height: 50px;
        }

        .container { display: flex; height: calc(100vh - 50px); background: white; }
        nav { width: 220px; background: #94d2bd; padding: 0.8rem; overflow-y: auto; }
        nav a { display: block; margin: 8px 0; text-decoration: none; color: #000; font-weight: 600; }
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h3>Akses Terkunci</h3>
            <p>Masukkan Password:</p>
            <input type="password" id="passInput" placeholder="Password...">
            <button onclick="validate()">Masuk</button>
        </div>
    </div>

    <div id="main-wrapper">
        <header>
            <h2>Monitoring Monitoring</h2>
        </header>
        <div class="container">
            <nav>
                <h4>MENU</h4>
                <a href="result_link_table.html" target="content-frame">Rekap Subring</a>
                <a href="del_01_pbr_dri.html" target="content-frame">01 PBR - DRI</a>
                <a href="del_02_ptk_skk.html" target="content-frame">02 PTK - SKK</a>
                <a href="del_03_bjm_uln.html" target="content-frame">03 BJM - ULN</a>
                <a href="del_04_plk_psb.html" target="content-frame">04 PLK - SBB</a>
                <a href="del_05_str_rpp.html" target="content-frame">05 STR - RPP</a>
                <a href="del_06_bna_lsm.html" target="content-frame">06 BNA - LSM</a>
                <a href="del_07_pl1_pl2.html" target="content-frame">07 PL1 - PL2</a>
                <a href="del_08_amb_tnt.html" target="content-frame">08 ABO - TNT</a>
                <a href="del_09_jap_srg.html" target="content-frame">09 JAP - SON</a>
                <a href="del_10_tmk_mrk.html" target="content-frame">10 SMI - BIK</a>
                <a href="del_11_tmk_ffa.html" target="content-frame">11 TIM - FAK</a>
                <a href="del_12_bim_mtr.html" target="content-frame">12 BIM - MTR</a>
                <a href="del_13_kup_mme.html" target="content-frame">13 KUP - MME</a>
                </nav>
            <iframe name="content-frame" src="{{ url_for('main.main_home') }}"></iframe>
        </div>
    </div>

    <script>
        const passKey = "telkom123";

        // Cek jika sudah login sebelumnya
        if (sessionStorage.getItem("isLoggedIn") === "true") {
            unlock();
        }

        function validate() {
            const input = document.getElementById("passInput").value;
            if (input === passKey) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlock();
            } else {
                alert("Password Salah!");
            }
        }

        function unlock() {
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("main-wrapper").style.display = "block";
        }

        // Support tekan Enter untuk masuk
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { validate(); }
        });
    </script>
</body>
</html>
